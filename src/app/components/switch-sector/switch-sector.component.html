<svg:path
  [attr.d]="sectorPath()"
  fill="transparent"
  class="stroke-white print:stroke-black"
  [attr.stroke-width]="strokeWidth()"
/>
<svg:path
  class="fill-chara-500 print:fill-black"
  [attr.d]="sectorPath() + ' Z'"
  [attr.opacity]="
    highlightPositionCodes().includes(positionCode()) ? highlightOpacity() : 0
  "
/>
