<svg
  width="100%"
  height="100%"
  preserveAspectRatio="xMidYMid meet"
  [attr.viewBox]="'0 0 ' + viewBoxWidth + ' ' + viewBoxHeight()"
>
  <ng-container>
    @for (side of sides; track side) {
      @for (sw of switches(); track sw) {
        <g
          appSwitch
          [center]="switchCenter(sw, side)"
          [rotationDirection]="side === 'left' ? 'cw' : 'ccw'"
          [rotation]="
            sw.startsWith('thumb') ? thumbRotationAngle : -nonThumbRotationAngle
          "
          [positionCodeMap]="positionCodeLayout[side][sw]"
          [highlightPositionCodes]="highlightedPositionCodes()"
        ></g>
      }
    }
  </ng-container>
</svg>
