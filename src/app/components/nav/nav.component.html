<mat-sidenav-container class="h-full" autosize>
  <mat-sidenav
    #drawer
    class="!w-[97px] !rounded-none !bg-gray-450"
    fixedInViewport
    role="navigation"
    mode="side"
    opened="true"
    disableClose]="true"
    data-style-dense
  >
    <header class="sticky top-0 z-10 bg-gray-450 shadow">
      <div class="flex flex-wrap">
        @for (navLink of navLinks; track $index) {
          <a
            [routerLink]="navLink.enabled() ? navLink.routerLink : null"
            routerLinkActive
            [routerLinkActiveOptions]="navLink.routerLinkActiveOptions"
            #rla="routerLinkActive"
            [attr.aria-label]="navLink.ariaLabel | translate"
            [matTooltip]="
              (navLink.enabled() ? navLink.tooltipMessage : navLink.lockMessage)
                | translate
            "
            [matTooltipPosition]="'right'"
          >
            <button
              class="!size-12"
              [class.!bg-chara-500]="rla.isActive"
              [class.!text-gray-900]="rla.isActive"
              type="button"
              mat-icon-button
              [disabled]="!navLink.enabled()"
            >
              <mat-icon>{{ navLink.icon | iconGuard }}</mat-icon>
            </button>
          </a>
        }
        <a>
          <button
            type="button"
            class="!size-12"
            mat-icon-button
            aria-label="button that opens hotkey dialog"
            (click)="openHotkeyDialog()"
            matTooltip="Open Hotkey Dialog"
            [disabled]="true"
          >
            <mat-icon>{{ "keyboard" | iconGuard }}</mat-icon>
          </button></a
        >

        @for (navLink of mainNavLinks; track $index) {
          <a
            [routerLink]="navLink.enabled() ? navLink.routerLink : null"
            routerLinkActive
            [routerLinkActiveOptions]="navLink.routerLinkActiveOptions"
            #rla="routerLinkActive"
            [attr.aria-label]="navLink.ariaLabel | translate"
            [matTooltip]="
              (navLink.enabled() ? navLink.tooltipMessage : navLink.lockMessage)
                | translate
            "
            [matTooltipPosition]="'right'"
            [class.!bg-chara-500]="rla.isActive"
          >
            <button
              type="button"
              mat-button
              class="!size-24 flex-col gap-1"
              [class.!text-gray-900]="rla.isActive"
              [disabled]="!navLink.enabled()"
            >
              <mat-icon
                class="!m-0 !size-8 !text-4xl"
                [matBadge]="navLink.count() || null"
                [matBadgeSize]="'large'"
                [matBadgeHidden]="rla.isActive"
                >{{ navLink.icon | iconGuard }}</mat-icon
              >
              <span>{{ navLink.title | translate | realTitleCase }}</span>
            </button>
          </a>
        }
      </div>
    </header>
  </mat-sidenav>
  <mat-sidenav-content>
    @if (!drawer.opened) {
      <button
        type="button"
        class="!fixed left-1 top-1/2 !z-10 -translate-y-1/2 cursor-pointer opacity-80 hover:text-chara-500"
        [attr.aria-label]="'nav.side-menu-toggle.aria-label' | translate"
        mat-icon-button
        (click)="drawer.toggle()"
      >
        <mat-icon
          [attr.aria-label]="'nav.side-menu-toggle.icon-aria-label' | translate"
          >{{ "left_panel_open" | iconGuard }}</mat-icon
        >
      </button>
    }
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
