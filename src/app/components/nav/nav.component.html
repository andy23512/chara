<mat-sidenav-container class="h-full" autosize>
  <mat-sidenav
    #drawer
    class="!w-[240px] !bg-gray-450"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
    [disableClose]="!(isHandset$ | async)"
    data-style-dense
  >
    <header class="sticky top-0 z-10 bg-gray-450 shadow">
      <div class="flex w-44 flex-wrap">
        @for (navLink of navLinks; track $index) {
          <a
            class="w-1/2"
            [routerLink]="navLink.routerLink"
            routerLinkActive
            [routerLinkActiveOptions]="navLink.routerLinkActiveOptions"
            #rla="routerLinkActive"
            [attr.aria-label]="navLink.ariaLabel | translate"
            [matTooltip]="navLink.tooltipMessage | translate"
            (click)="onNavLinkClick()"
          >
            <button
              type="button"
              mat-flat-button
              class="whitespace-nowrap"
              [color]="rla.isActive ? 'primary' : null"
            >
              <mat-icon>{{ navLink.icon | iconGuard }}</mat-icon>
              {{ navLink.title | translate | realTitleCase }}
            </button>
          </a>
        }
      </div>
    </header>
  </mat-sidenav>
  <mat-sidenav-content>
    @if (!drawer.opened) {
      <button
        type="button"
        class="!fixed left-1 top-1/2 !z-10 -translate-y-1/2 cursor-pointer opacity-80 hover:text-chara-500"
        [attr.aria-label]="'nav.side-menu-toggle.aria-label' | translate"
        mat-icon-button
        (click)="drawer.toggle()"
      >
        <mat-icon
          [attr.aria-label]="'nav.side-menu-toggle.icon-aria-label' | translate"
          >{{ "left_panel_open" | iconGuard }}</mat-icon
        >
      </button>
    }
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
