<section class="flex-none">
  <div class="relative h-20 overflow-hidden text-2xl">
    <div
      class="absolute top-2 space-x-1 whitespace-nowrap text-gray-300"
      [style.right]="'calc(100% - 96px)'"
    >
      @for (chord of history(); track $index) {
        <span>{{ chord.textOutput }}</span>
      }
    </div>
    <div class="absolute left-24 top-2 space-x-1 whitespace-nowrap">
      @for (chord of queue(); track $index; let isFirst = $first) {
        <span class="underline-offset-8" [class.underline]="isFirst">{{
          chord.textOutput
        }}</span>
      }
    </div>
    <div class="absolute bottom-0 left-24 whitespace-nowrap text-chara-500">
      {{ inputValue()
      }}<span
        class="animate-ping border-l border-solid border-chara-500"
      ></span>
    </div>
    <input
      class="peer h-0 w-0 opacity-0"
      type="text"
      #input
      inputmode="none"
      [(ngModel)]="inputValue"
      (input)="onInput($any($event))"
      (focus)="isFocus.set(true)"
      (blur)="isFocus.set(false); pausePractice()"
    />
    <div
      class="absolute inset-0 flex cursor-pointer items-center justify-end bg-surface p-2 text-white peer-focus:pointer-events-none peer-focus:opacity-0"
    >
      <button mat-flat-button (click)="startPractice()">
        <mat-icon class="!size-6 !text-[24px]">{{
          "play_arrow" | iconGuard
        }}</mat-icon>
        {{ "general.start-action" | translate | realTitleCase }}
      </button>
    </div>
    @if (isFocus()) {
      <div
        class="absolute right-0 top-0 flex h-full items-center bg-surface p-2 text-white"
      >
        <button mat-flat-button (click)="pausePractice()">
          <mat-icon class="!size-6 !text-[24px]">{{
            "pause" | iconGuard
          }}</mat-icon>
          {{ "general.pause-action" | translate | realTitleCase }}
        </button>
      </div>
    }
  </div>
</section>
<app-layout
  class="box-border block flex-1 overflow-hidden px-5 pb-5"
  [showThumb3Switch]="visibilitySettingStore.layoutThumb3Switch()"
  [highlightedPositionCodes]="showHint() ? highlightedPositionCodes() : []"
></app-layout>
@if (showHint()) {
  <div
    class="absolute bottom-2 left-1/2 flex -translate-x-1/2 items-center gap-1"
  >
    @if (currentChordDynamicLibraryAncestors().length > 0) {
      <app-dynamic-library-ancestors-chip
        [dynamicLibraryAncestors]="currentChordDynamicLibraryAncestors()"
      ></app-dynamic-library-ancestors-chip>
    }
    @if (totalSteps() > 1) {
      <app-stepper
        class="absolute bottom-2 left-1/2 -translate-x-1/2"
        [totalSteps]="totalSteps()"
        [stepIndex]="chordStepIndex()"
      ></app-stepper>
    }
  </div>
}
<app-speedometer
  *appVisible="'speedometer'"
  class="absolute bottom-4 right-4 size-24"
  [class.opacity-50]="isFocus()"
  [speed]="chpm()"
  [maxSpeed]="100"
  [speedUnit]="'general.chord-speed-unit' | translate"
></app-speedometer>
